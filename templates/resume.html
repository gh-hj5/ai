<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>简历详情 - AI 简历助手</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/resume.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <div class="navbar-title">✨ AI 简历助手 · 深度工作台</div>
            <div class="navbar-user">
                <span id="userInfo"></span>
                <button id="logoutBtn" class="btn btn-secondary">退出登录</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <a href="/dashboard.html" class="btn btn-secondary" style="margin-bottom: 24px; display: inline-flex; align-items: center; gap: 8px;">← 返回工作台</a>

        <div id="content">
            <div id="loading" class="loading">加载中...</div>
            <div id="errorMessage" class="hidden"></div>

            <!-- 简历信息卡片：美观分行 -->
            <div class="card" style="padding: 28px 32px;">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 20px;">
                    <h2 class="section-title" style="margin:0;">📄 简历信息</h2>
                    <span class="score-pill" id="fileFormatBadge">PDF 文档</span>
                </div>
                <div id="resumeInfo" class="resume-detail-grid"></div>
            </div>

            <!-- 简历分析区域：结构化分行分点 -->
            <div class="card">
                <div class="section-header">
                    <div>
                        <h2>🔍 智能分析报告</h2>
                        <p class="section-desc">基于简历深度解析，输出结构化亮点、技能树与优化建议</p>
                    </div>
                    <button id="analyzeBtn" class="btn btn-primary">✨ 开始分析 / 重新分析</button>
                </div>
                <div id="analysisResult" class="analysis-enhanced"></div>
            </div>

            <!-- 面试题目区域：卡片清晰 -->
            <div class="card">
                <div class="section-header">
                    <div>
                        <h2>🎯 面试题库 & 参考答案</h2>
                        <p class="section-desc">根据简历内容生成的模拟面试题（技术+行为+场景）</p>
                    </div>
                    <div class="resume-actions" style="gap: 12px;">
                        <input type="number" id="numQuestions" min="1" max="30" value="8" class="small-number-input" style="width: 85px;">
                        <button id="generateBtn" class="btn btn-success">⚡ 生成题目</button>
                    </div>
                </div>
                <div id="generating" class="hidden"></div>
                <div id="questionsList" style="display: flex; flex-direction: column; gap: 20px;"></div>
            </div>

            <!-- 优化生成与版本管理 -->
            <div class="card">
                <div class="section-header">
                    <div>
                        <h2>✍️ 简历优化工坊</h2>
                        <p class="section-desc">基于问诊画像 + 岗位匹配结果，生成可导出的优化版本（通用/定制/精简）</p>
                    </div>
                </div>
                <div class="optimization-toolbar" style="margin-bottom: 24px;">
                    <div class="form-group">
                        <label for="versionTypeSelect">📌 优化风格</label>
                        <select id="versionTypeSelect">
                            <option value="general">通用优化版 (突出全面优势)</option>
                            <option value="job_targeted">岗位定制版 (贴合JD)</option>
                            <option value="compact">精简投递版 (一页纸)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="sessionSelect">🧠 问诊画像</label>
                        <select id="sessionSelect"></select>
                    </div>
                    <div class="form-group">
                        <label for="jobMatchSelect">🎯 岗位匹配结果</label>
                        <select id="jobMatchSelect"></select>
                    </div>
                    <div class="form-group action-group">
                        <button id="generateOptimizationBtn" class="btn btn-primary" style="width: 100%;">🚀 生成优化版本</button>
                    </div>
                </div>
                <div id="optimizationMessage" class="hidden"></div>
                <div id="optimizationVersions" class="resume-list" style="margin-top: 6px;"></div>
            </div>

            <!-- 导出记录 -->
            <div class="card">
                <div class="section-header">
                    <div>
                        <h2>📎 导出记录 & 下载</h2>
                        <p class="section-desc">已导出的优化版本 (TXT/MD/DOCX/PDF)</p>
                    </div>
                </div>
                <div id="exportRecords" class="resume-list"></div>
            </div>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/resume.js"></script>
</body>
</html>
